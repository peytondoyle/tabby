name: TabbyApp
options:
  bundleIdPrefix: com.tabby
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 3RP42MC533
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  TabbyApp:
    type: application
    platform: iOS
    sources:
      - path: Tabby/Sources/Tabby
        excludes:
          - "App/TabbyApp.swift"
          - "Resources/Info.plist"
      - path: TabbyApp
        excludes:
          - Info.plist
    dependencies:
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tabby.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        INFOPLIST_FILE: TabbyApp/Info.plist
    info:
      path: TabbyApp/Info.plist
      properties:
        CFBundleDisplayName: Tabby
        CFBundleName: Tabby
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Tabby needs camera access to scan receipts"
        LSApplicationQueriesSchemes:
          - venmo
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.tabby.app
            CFBundleURLSchemes:
              - tabby
